name: CI/CD GameVibe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, bcmath, gd, pcntl, exif
          coverage: pcov

      - name: Installer les dépendances Composer
        working-directory: backend
        run: composer install --optimize-autoloader --no-interaction

      - name: Copier le fichier .env de test
        working-directory: backend
        run: |
          cp .env.example .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env

      - name: Générer la clé Laravel
        working-directory: backend
        run: php artisan key:generate

      - name: Lancer les tests avec couverture
        working-directory: backend
        run: php artisan test --coverage --min=60

  security-scan:
    name: Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Scanner le système de fichiers avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'

  deploy:
    name: Déploiement Railway
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Déployer le backend sur Railway
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", serviceId: \"${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}\") }"}' \
            https://backboard.railway.com/graphql/v2

      - name: Déployer le frontend sur Railway
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", serviceId: \"${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }}\") }"}' \
            https://backboard.railway.com/graphql/v2